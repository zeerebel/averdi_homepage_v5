  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\" class=\"anim\"><head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n  <title>A-Verdi Storage Containers \u2014 Storage &amp; Office Solutions ...Delivered!<\/title>\n  <style>\n@font-face{font-family:'Barlow';font-style:italic;font-weight:700;font-display:swap;src:url(\"8ed47fd8-19e4-4b05-b270-a5f96213d2ba\") format('woff2');}\n@font-face{font-family:'Barlow';font-style:normal;font-weight:300;font-display:swap;src:url(\"23dd9a9b-b7c8-4b81-8e97-f774e034d51f\") format('woff2');}\n@font-face{font-family:'Barlow';font-style:normal;font-weight:400;font-display:swap;src:url(\"4a31424b-aebe-4fc4-b590-00f5368f0ede\") format('woff2');}\n@font-face{font-family:'Barlow';font-style:normal;font-weight:500;font-display:swap;src:url(\"1a083f71-dab3-4339-a00d-5e0c72f811e6\") format('woff2');}\n@font-face{font-family:'Barlow';font-style:normal;font-weight:600;font-display:swap;src:url(\"8fbb8fdf-a4e7-43ab-a440-0caea49b6dab\") format('woff2');}\n@font-face{font-family:'Oswald';font-style:normal;font-weight:400 700;font-display:swap;src:url(\"f134e905-1d55-4112-b3fd-9b4a90903908\") format('woff2');}\n<\/style>\n\n  \n  <style>\n    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\n    :root {\n      --yellow:      #F0B800;\n      --yellow-dk:   #D9A400;\n      --black:       #111111;\n      --dark:        #1A1A1A;\n      --white:       #FFFFFF;\n      --off-white:   #F5F4F0;\n      --mid:         #777777;\n      --border:      #E4E4E0;\n    }\n\n    html { scroll-behavior: smooth; }\n\n    body {\n      font-family: 'Barlow', sans-serif;\n      color: var(--black);\n      background: var(--white);\n      line-height: 1.5;\n    }\n\n    \/* \u2500\u2500 UTILITY BAR \u2500\u2500 *\/\n    .util-bar {\n      background: var(--black);\n      padding: 9px 56px;\n      display: flex;\n      justify-content: space-between;\n      align-items: center;\n    }\n    .util-bar a, .util-bar span {\n      color: #888;\n      font-size: 12.5px;\n      font-weight: 500;\n      text-decoration: none;\n      letter-spacing: 0.04em;\n      transition: color 0.15s;\n    }\n    .util-bar a:hover { color: var(--yellow); }\n    .util-left, .util-right { display: flex; align-items: center; gap: 24px; }\n    .util-sep { width: 1px; height: 13px; background: #2e2e2e; }\n\n    \/* \u2500\u2500 MAIN NAV \u2500\u2500 *\/\n    .main-nav {\n      background: var(--white);\n      padding: 0 56px;\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      height: 74px;\n      border-bottom: 3px solid var(--yellow);\n      position: sticky;\n      top: 0;\n      z-index: 200;\n      box-shadow: 0 2px 18px rgba(0,0,0,0.07);\n    }\n    .nav-logo img { height: 50px; display: block; }\n    .nav-links { display: flex; list-style: none; height: 100%; align-items: center; gap: 0; }\n    .nav-links > li { height: 100%; display: flex; align-items: center; }\n    .nav-links > li > a {\n      display: flex;\n      align-items: center;\n      height: 100%;\n      padding: 0 18px;\n      text-decoration: none;\n      color: var(--black);\n      font-size: 12.5px;\n      font-weight: 600;\n      letter-spacing: 0.09em;\n      text-transform: uppercase;\n      transition: color 0.15s;\n      border-bottom: 3px solid transparent;\n      margin-bottom: -3px;\n    }\n    .nav-links > li > a:hover { color: var(--yellow); border-bottom-color: var(--yellow); }\n    .nav-cta {\n      background: var(--yellow) !important;\n      color: var(--black) !important;\n      padding: 0 28px !important;\n      height: 74px !important;\n      font-weight: 700 !important;\n      letter-spacing: 0.1em !important;\n      border-bottom: none !important;\n      margin-bottom: 0 !important;\n    }\n    .nav-cta:hover { background: var(--yellow-dk) !important; }\n\n    \/* \u2500\u2500 HERO \u2500\u2500 *\/\n    .hero {\n      position: relative;\n      min-height: 620px;\n      background: var(--dark);\n      display: grid;\n      grid-template-columns: 1fr 1fr;\n      overflow: hidden;\n    }\n    \/* Yellow left-edge stripe *\/\n    .hero::before {\n      content: '';\n      position: absolute;\n      left: 0; top: 0; bottom: 0;\n      width: 5px;\n      background: var(--yellow);\n      z-index: 10;\n    }\n    \/* Subtle corrugation texture on full hero *\/\n    .hero::after {\n      content: '';\n      position: absolute;\n      inset: 0;\n      background-image: repeating-linear-gradient(\n        90deg,\n        rgba(255,255,255,0.016) 0px, rgba(255,255,255,0.016) 1px,\n        transparent 1px, transparent 46px\n      );\n      pointer-events: none;\n      z-index: 1;\n    }\n\n    .hero-text {\n      position: relative;\n      z-index: 3;\n      padding: 80px 72px 80px 80px;\n      display: flex;\n      flex-direction: column;\n      justify-content: center;\n    }\n    .hero-eyebrow {\n      font-size: 11px;\n      font-weight: 700;\n      letter-spacing: 0.3em;\n      text-transform: uppercase;\n      color: var(--yellow);\n      margin-bottom: 22px;\n    }\n    .hero h1 {\n      font-family: 'Oswald', sans-serif;\n      font-weight: 700;\n      font-size: clamp(44px, 5.5vw, 74px);\n      color: var(--white);\n      text-transform: uppercase;\n      line-height: 1.0;\n      margin-bottom: 28px;\n      text-wrap: balance;\n    }\n    .hero h1 em { font-style: italic; color: var(--yellow); }\n    .hero-sub {\n      color: #999;\n      font-size: 16px;\n      font-weight: 400;\n      line-height: 1.7;\n      max-width: 420px;\n      margin-bottom: 42px;\n    }\n    .hero-btns { display: flex; gap: 14px; }\n\n    \/* Container art area *\/\n    .hero-art {\n      position: relative;\n      z-index: 2;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      overflow: hidden;\n    }\n    \/* Gradient fade \u2014 left edge blends into dark bg *\/\n    .hero-art::before {\n      content: '';\n      position: absolute;\n      inset: 0;\n      background: linear-gradient(90deg, var(--dark) 0%, rgba(26,26,26,0.15) 45%, transparent 100%);\n      z-index: 2;\n    }\n\n    \/* Stacked container CSS art *\/\n    .container-stack {\n      position: relative;\n      z-index: 3;\n      width: 440px;\n      height: 360px;\n    }\n\n    \/* Each .ctr is a shipping container in isometric-ish perspective *\/\n    .ctr {\n      position: absolute;\n      width: 380px;\n      height: 180px;\n    }\n\n    \/* Back container \u2014 dark, shifted up-left *\/\n    .ctr-back {\n      top: 20px;\n      left: 30px;\n      opacity: 0.7;\n    }\n    \/* Front container \u2014 yellow, main *\/\n    .ctr-front {\n      top: 120px;\n      left: 0;\n    }\n\n    .ctr-face {\n      position: absolute;\n      top: 0; left: 0;\n      width: 340px;\n      height: 160px;\n    }\n    .ctr-face-yellow { background: var(--yellow); }\n    .ctr-face-dark   { background: #2e2e2e; }\n\n    \/* Corrugated ribs *\/\n    .ctr-face::before {\n      content: '';\n      position: absolute;\n      inset: 0;\n      background-image: repeating-linear-gradient(\n        90deg,\n        rgba(0,0,0,0.13) 0px, rgba(0,0,0,0.13) 2px,\n        rgba(255,255,255,0.05) 2px, rgba(255,255,255,0.05) 4px,\n        transparent 4px, transparent 26px\n      );\n    }\n    \/* Door panel right side *\/\n    .ctr-face::after {\n      content: '';\n      position: absolute;\n      right: 0; top: 0; bottom: 0;\n      width: 70px;\n      border-left: 3px solid rgba(0,0,0,0.22);\n      background: rgba(0,0,0,0.09);\n    }\n\n    \/* Top face (parallelogram) *\/\n    .ctr-top {\n      position: absolute;\n      top: -26px;\n      left: 18px;\n      width: 322px;\n      height: 26px;\n      background: #c59800;\n      clip-path: polygon(0% 100%, 3% 0%, 100% 0%, 97% 100%);\n    }\n    .ctr-top-dark { background: #222; }\n\n    \/* Right side face *\/\n    .ctr-right {\n      position: absolute;\n      top: -26px;\n      left: 340px;\n      width: 22px;\n      height: 186px;\n      background: #9a7600;\n      clip-path: polygon(16% 0%, 100% 14%, 100% 100%, 0% 100%);\n    }\n    .ctr-right-dark { background: #111; }\n\n    \/* Container label *\/\n    .ctr-label-text {\n      position: absolute;\n      bottom: 14px;\n      left: 16px;\n      font-family: 'Oswald', sans-serif;\n      font-weight: 700;\n      font-size: 17px;\n      letter-spacing: 0.18em;\n      text-transform: uppercase;\n      z-index: 2;\n    }\n    .ctr-label-dark  { color: rgba(0,0,0,0.45); }\n    .ctr-label-light { color: rgba(255,255,255,0.35); }\n\n    .ctr-serial {\n      position: absolute;\n      top: 12px;\n      left: 16px;\n      font-family: 'Barlow', sans-serif;\n      font-size: 10px;\n      font-weight: 600;\n      letter-spacing: 0.08em;\n      color: rgba(0,0,0,0.3);\n    }\n    .ctr-serial-light { color: rgba(255,255,255,0.22); }\n\n    \/* Drop shadow beneath container *\/\n    .ctr-shadow {\n      position: absolute;\n      bottom: -10px;\n      left: 8px;\n      right: 8px;\n      height: 12px;\n      background: rgba(0,0,0,0.4);\n      filter: blur(8px);\n      border-radius: 50%;\n    }\n\n    \/* \u2500\u2500 SHARED BUTTONS \u2500\u2500 *\/\n    .btn-yellow {\n      background: var(--yellow);\n      color: var(--black);\n      padding: 15px 34px;\n      font-family: 'Barlow', sans-serif;\n      font-weight: 700;\n      font-size: 13px;\n      letter-spacing: 0.1em;\n      text-transform: uppercase;\n      text-decoration: none;\n      display: inline-block;\n      transition: background 0.15s, transform 0.15s;\n    }\n    .btn-yellow:hover { background: var(--yellow-dk); transform: translateY(-1px); }\n\n    .btn-ghost {\n      border: 2px solid rgba(255,255,255,0.22);\n      color: rgba(255,255,255,0.8);\n      padding: 15px 34px;\n      font-family: 'Barlow', sans-serif;\n      font-weight: 700;\n      font-size: 13px;\n      letter-spacing: 0.1em;\n      text-transform: uppercase;\n      text-decoration: none;\n      display: inline-block;\n      transition: border-color 0.15s, color 0.15s;\n    }\n    .btn-ghost:hover { border-color: var(--yellow); color: var(--yellow); }\n\n    .btn-arrow {\n      display: inline-flex;\n      align-items: center;\n      gap: 10px;\n      background: var(--yellow);\n      color: var(--black);\n      padding: 13px 24px;\n      font-family: 'Barlow', sans-serif;\n      font-weight: 700;\n      font-size: 12px;\n      letter-spacing: 0.12em;\n      text-transform: uppercase;\n      text-decoration: none;\n      width: fit-content;\n      transition: background 0.15s, gap 0.2s;\n    }\n    .btn-arrow:hover { background: var(--yellow-dk); gap: 16px; }\n\n    .btn-black {\n      background: var(--black);\n      color: var(--white);\n      padding: 18px 44px;\n      font-family: 'Barlow', sans-serif;\n      font-weight: 700;\n      font-size: 14px;\n      letter-spacing: 0.1em;\n      text-transform: uppercase;\n      text-decoration: none;\n      white-space: nowrap;\n      flex-shrink: 0;\n      transition: background 0.15s;\n    }\n    .btn-black:hover { background: #2a2a2a; }\n\n    \/* \u2500\u2500 AUDIENCE PANELS \u2500\u2500 *\/\n    .panel {\n      display: grid;\n      grid-template-columns: 1fr 1fr;\n      min-height: 500px;\n    }\n\n    .panel-text {\n      padding: 88px 72px;\n      display: flex;\n      flex-direction: column;\n      justify-content: center;\n    }\n\n    .panel-kicker {\n      font-size: 10.5px;\n      font-weight: 700;\n      letter-spacing: 0.32em;\n      text-transform: uppercase;\n      color: var(--yellow);\n      margin-bottom: 14px;\n    }\n    .panel-h2 {\n      font-family: 'Oswald', sans-serif;\n      font-weight: 700;\n      font-size: clamp(40px, 4vw, 60px);\n      text-transform: uppercase;\n      line-height: 1.0;\n      margin-bottom: 28px;\n    }\n    .panel-light .panel-h2 { color: var(--black); }\n    .panel-dark  .panel-h2 { color: var(--white); }\n\n    .panel-bullets { list-style: none; margin-bottom: 38px; }\n    .panel-bullets li {\n      font-size: 15px;\n      font-weight: 400;\n      line-height: 1.65;\n      padding: 5px 0;\n      display: flex;\n      align-items: baseline;\n      gap: 12px;\n    }\n    .panel-bullets li::before { content: '\u2013'; color: var(--yellow); font-weight: 700; flex-shrink: 0; }\n    .panel-light .panel-bullets li { color: #555; }\n    .panel-dark  .panel-bullets li { color: #aaa; }\n\n    \/* Image side of panel *\/\n    .panel-img {\n      position: relative;\n      overflow: hidden;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      min-height: 480px;\n    }\n    .panel-img::before {\n      content: '';\n      position: absolute;\n      top: 0; left: 0; right: 0;\n      height: 4px;\n      background: var(--yellow);\n      z-index: 2;\n    }\n\n    .img-construction { background: #232820; }\n    .img-residential  { background: #1A1D24; }\n    .img-commercial   { background: #202020; }\n\n    \/* Photo label watermark *\/\n    .panel-img::after {\n      position: absolute;\n      bottom: 18px;\n      right: 18px;\n      font-size: 10px;\n      font-weight: 600;\n      color: rgba(255,255,255,0.12);\n      letter-spacing: 0.12em;\n      text-transform: uppercase;\n      z-index: 2;\n    }\n    .img-construction::after { content: 'CONSTRUCTION SITE PHOTO'; }\n    .img-residential::after  { content: 'RESIDENTIAL PHOTO'; }\n    .img-commercial::after   { content: 'COMMERCIAL PHOTO'; }\n\n    \/* Container in panels *\/\n    .panel-ctr {\n      position: relative;\n      z-index: 3;\n      width: 340px;\n      height: 200px;\n    }\n    .panel-ctr-body {\n      position: absolute;\n      inset: 0;\n    }\n    .panel-ctr-face {\n      position: absolute;\n      inset: 0;\n    }\n    .panel-ctr-face::before {\n      content: '';\n      position: absolute;\n      inset: 0;\n      background-image: repeating-linear-gradient(\n        90deg,\n        rgba(0,0,0,0.13)       color: #555;\n      font-size: 16px;\n      line-height: 1.78;\n      margin-bottom: 16px;\n    }\n\n    .badge-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 32px; }\n    .badge {\n      background: var(--black);\n      color: var(--white);\n      padding: 10px 18px;\n      font-size: 12px;\n      font-weight: 700;\n      letter-spacing: 0.07em;\n      text-transform: uppercase;\n      display: flex;\n      align-items: center;\n      gap: 8px;\n    }\n    .badge-dot {\n      width: 6px; height: 6px;\n      background: var(--yellow);\n      border-radius: 50%;\n      flex-shrink: 0;\n    }\n\n    .about-visual { position: relative; }\n    .about-photo {\n      background: var(--dark);\n      aspect-ratio: 4\/3;\n      position: relative;\n      overflow: hidden;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n    }\n    .about-photo::before {\n      content: '';\n      position: absolute;\n      inset: 0;\n      background-image:\n        repeating-linear-gradient(0deg, rgba(255,255,255,0.022) 0, rgba(255,255,255,0.022) 1px, transparent 1px, transparent 40px),\n        repeating-linear-gradient(90deg, rgba(255,255,255,0.022) 0, rgba(255,255,255,0.022) 1px, transparent 1px, transparent 40px);\n    }\n    .about-photo-label {\n      position: absolute;\n      bottom: 16px;\n      left: 0; right: 0;\n      text-align: center;\n      font-size: 10.5px;\n      color: rgba(255,255,255,0.18);\n      letter-spacing: 0.14em;\n      font-weight: 600;\n      z-index: 3;\n    }\n    .callout-box {\n      position: absolute;\n      bottom: -24px;\n      right: -24px;\n      background: var(--yellow);\n      padding: 22px 26px;\n      text-align: center;\n      box-shadow: 4px 4px 0 rgba(0,0,0,0.13);\n      z-index: 4;\n    }\n    .callout-num {\n      font-family: 'Oswald', sans-serif;\n      font-size: 50px;\n      font-weight: 700;\n      line-height: 1;\n      color: var(--black);\n    }\n    .callout-label {\n      font-size: 11px;\n      font-weight: 700;\n      letter-spacing: 0.06em;\n      text-transform: uppercase;\n      color: rgba(0,0,0,0.65);\n      margin-top: 4px;\n      line-height: 1.4;\n    }\n\n    \/* \u2500\u2500 WHAT SETS US APART \u2500\u2500 *\/\n    .wsa-section {\n      background: var(--black);\n      padding: 100px 80px;\n    }\n    .wsa-inner {\n      display: grid;\n      grid-template-columns: 1fr 1fr;\n      gap: 96px;\n      align-items: start;\n    }\n    .wsa-headline {\n      font-family: 'Oswald', sans-serif;\n      font-weight: 700;\n      font-size: clamp(44px, 5vw, 68px);\n      text-transform: uppercase;\n      line-height: 1.0;\n      color: var(--white);\n    }\n    .wsa-headline em { font-style: normal; color: var(--yellow); }\n    .wsa-sub {\n      color: #777;\n      font-size: 16px;\n      line-height: 1.72;\n      margin: 24px 0 36px;\n    }\n    .wsa-grid {\n      display: grid;\n      grid-template-columns: 1fr 1fr;\n      gap: 32px 40px;\n      padding-top: 8px;\n    }\n    .wsa-item { border-top: 2px solid var(--yellow); padding-top: 16px; }\n    .wsa-item h4 { color: var(--white); font-size: 15px; font-weight: 600; margin-bottom: 8px; }\n    .wsa-item p  { color: #666; font-size: 14px; line-height: 1.62; }\n\n    \/* \u2500\u2500 PRODUCTS \u2500\u2500 *\/\n    .products-section { padding: 100px 80px; background: var(--white); }\n    .section-head {\n      display: flex;\n      align-items: flex-end;\n      justify-content: space-between;\n      margin-bottom: 56px;\n    }\n\n    .products-grid {\n      display: grid;\n      grid-template-columns: repeat(3, 1fr);\n      gap: 2px;\n      background: var(--border);\n    }\n    .product-card {\n      background: var(--black);\n      padding: 48px 40px;\n      position: relative;\n      overflow: hidden;\n      cursor: pointer;\n      transition: background 0.2s;\n    }\n    .product-card::after {\n      content: '';\n      position: absolute;\n      bottom: 0; left: 0; right: 0;\n ; margin-bottom: 20px; }\n    .footer-desc { color: #4a4a4a; font-size: 14px; line-height: 1.78; }\n    .footer-col-title {\n      font-size: 11px;\n      font-weight: 700;\n      letter-spacing: 0.22em;\n      text-transform: uppercase;\n      color: var(--white);\n      margin-bottom: 20px;\n    }\n    .footer-links { list-style: none; }\n    .footer-links li { margin-bottom: 10px; }\n    .footer-links li a {\n      color: #4a4a4a;\n      text-decoration: none;\n      font-size: 14px;\n      transition: color 0.15s;\n    }\n    .footer-links li a:hover { color: var(--yellow); }\n    .footer-phone {\n      color: var(--yellow);\n      font-size: 18px;\n      font-weight: 700;\n      text-decoration: none;\n      display: block;\n      margin-bottom: 5px;\n    }\n    .footer-hours { color: #3e3e3e; font-size: 13px; margin-bottom: 28px; }\n\n    .footer-bottom {\n      display: flex;\n      justify-content: space-between;\n      align-items: center;\n      padding-top: 28px;\n      font-size: 12px;\n      color: #2e2e2e;\n    }\n    .footer-family { display: flex; gap: 24px; }\n    .footer-family a {\n      color: #3e3e3e;\n      font-size: 13px;\n      text-decoration: none;\n      transition: color 0.15s;\n    }\n    .footer-family a:hover { color: var(--yellow); }\n    .socials { display: flex; gap: 8px; }\n    .social-icon {\n      width: 34px; height: 34px;\n      background: #161616;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      color: #444;\n      text-decoration: none;\n      font-size: 12px;\n      font-weight: 700;\n      transition: background 0.15s, color 0.15s;\n    }\n    .social-icon:hover { background: var(--yellow); color: var(--black); }\n\n    \/* \u2500\u2500 VERDIE CHAT BUBBLE \u2500\u2500 *\/\n    #verdie-bubble {\n      position: fixed;\n      bottom: 28px; right: 28px;\n      width: 56px; height: 56px;\n      background: var(--yellow);\n      border-radius: 50%;\n      border: none; cursor: pointer;\n      z-index: 1001;\n      display: flex; align-items: center; justify-content: center;\n      box-shadow: 0 4px 28px rgba(0,0,0,0.35);\n      transition: transform 0.2s, background 0.15s;\n    }\n    #verdie-bubble:hover { transform: scale(1.08); background: var(--yellow-dk); }\n    #verdie-bubble.open  { transform: scale(0.94); }\n    .vb-icon  { transition: opacity 0.18s; }\n    .vb-close { position: absolute; opacity: 0; transition: opacity 0.18s; font-size: 18px; color: var(--black); font-weight: 700; line-height: 1; }\n    #verdie-bubble.open .vb-icon  { opacity: 0; }\n    #verdie-bubble.open .vb-close { opacity: 1; }\n\n    #verdie-win {\n      position: fixed;\n      bottom: 96px; right: 28px;\n      width: 340px;\n      background: #1c1c1c;\n      border: 1px solid rgba(0,0,0,0.15);\n      display: flex; flex-direction: column;\n      z-index: 1000;\n      box-shadow: 0 8px 48px rgba(0,0,0,0.25);\n      transform: translateY(20px) scale(0.96);\n      opacity: 0; pointer-events: none;\n      transition: transform 0.28s cubic-bezier(0.16,1,0.3,1), opacity 0.28s;\n      transform-origin: bottom right;\n    }\n    #verdie-win.open { transform: translateY(0) scale(1); opacity: 1; pointer-events: all; }\n\n    .vh { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.07); display: flex; align-items: center; gap: 11px; flex-shrink: 0; }\n    .vh-av { width: 34px; height: 34px; background: var(--yellow); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 13px; color: var(--black); }\n    .vh-name { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 14px; color: #ffffff; text-transform: uppercase; letter-spacing: 0.08em; }\n    .vh-status { font-size: 10.5px; color: rgba(255,255,255,0.32); margin-top: 1px; }\n    .vh-status::before { content: '\u25cf'; color: #4ade80; margin-right: 4px; font-size: 7px; }\n\n    .vm { overflow-y: aut theast. Fast delivery. Family owned. Superior service.<\/p>\n      <\/div>\n      <div>\n        <p class=\"footer-col-title\">Quick Links<\/p>\n        <ul class=\"footer-links\">\n          <li><a href=\"#\">Products<\/a><\/li>\n          <li><a href=\"#\">Construction<\/a><\/li>\n          <li><a href=\"#\">Residential<\/a><\/li>\n          <li><a href=\"#\">Commercial<\/a><\/li>\n          <li><a href=\"#\">Blog<\/a><\/li>\n        <\/ul>\n      <\/div>\n      <div>\n        <p class=\"footer-col-title\">Company<\/p>\n        <ul class=\"footer-links\">\n          <li><a href=\"#\">Who We Are<\/a><\/li>\n          <li><a href=\"#\">How It Works<\/a><\/li>\n          <li><a href=\"#\">Delivery &amp; Setup<\/a><\/li>\n          <li><a href=\"#\">Service Areas<\/a><\/li>\n          <li><a href=\"#\">Careers<\/a><\/li>\n          <li><a href=\"#\">Privacy Policy<\/a><\/li>\n          <li><a href=\"#\">Contact<\/a><\/li>\n        <\/ul>\n      <\/div>\n      <div>\n        <p class=\"footer-col-title\">Contact Us<\/p>\n        <a href=\"tel:8002483734\" class=\"footer-phone\">800-248-3734<\/a>\n        <p class=\"footer-hours\">M\u2013F \/ 7:30AM \u2013 5:00PM<\/p>\n        <p class=\"footer-col-title\">Family of Companies<\/p>\n        <ul class=\"footer-links\">\n          <li><a href=\"#\">Jamesville Office Trailers<\/a><\/li>\n          <li><a href=\"#\">A-Verdi Self Storage<\/a><\/li>\n          <li><a href=\"#\">Youngstown Sayre<\/a><\/li>\n        <\/ul>\n      <\/div>\n    <\/div>\n    <div class=\"footer-bottom\">\n      <span>\u00a9 2026 A-Verdi Storage Containers. All Rights Reserved.<\/span>\n      <div class=\"socials\">\n        <a href=\"#\" class=\"social-icon\">f<\/a>\n        <a href=\"#\" class=\"social-icon\">ig<\/a>\n        <a href=\"#\" class=\"social-icon\">yt<\/a>\n        <a href=\"#\" class=\"social-icon\">in<\/a>\n      <\/div>\n    <\/div>\n  <\/footer>\n\n  <!-- \u2550\u2550\u2550\u2550 VERDIE CHAT BUBBLE \u2550\u2550\u2550\u2550 -->\n  <button id=\"verdie-bubble\" onclick=\"verdieToggle()\" aria-label=\"Chat with Verdie\">\n    <svg class=\"vb-icon\" width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\">\n      <path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\" stroke=\"#111\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\/path>\n    <\/svg>\n    <span class=\"vb-close\">\u2715<\/span>\n  <\/button>\n\n  <div id=\"verdie-win\">\n    <div class=\"vh\">\n      <div class=\"vh-av\">V<\/div>\n      <div>\n        <div class=\"vh-name\">Verdie<\/div>\n        <div class=\"vh-status\">A-Verdi Assistant<\/div>\n      <\/div>\n    <\/div>\n    <div class=\"vm\" id=\"verdie-msgs\"><\/div>\n    <div class=\"vi\">\n      <textarea id=\"verdie-input\" placeholder=\"Ask about storage, delivery, pricing\u2026\" rows=\"1\"><\/textarea>\n      <button class=\"vi-send\" id=\"verdie-send\" aria-label=\"Send\">\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\">\n          <line x1=\"22\" y1=\"2\" x2=\"11\" y2=\"13\" stroke=\"#111\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\/line>\n          <polygon points=\"22 2 15 22 11 13 2 9 22 2\" stroke=\"#111\" stroke-width=\"2\" stroke-linejoin=\"round\"><\/polygon>\n        <\/svg>\n      <\/button>\n    <\/div>\n  <\/div>\n\n  <script>\n    function verdieToggle() {\n      const win = document.getElementById('verdie-win');\n      const btn = document.getElementById('verdie-bubble');\n      const open = win.classList.toggle('open');\n      btn.classList.toggle('open', open);\n      if (open && document.getElementById('verdie-msgs').children.length === 0) {\n        verdieAdd('ai', \"Hi! I\\u2019m Verdie, A-Verdi\\u2019s assistant. Ask me anything about our storage containers, van trailers, portable offices, or delivery options!\");\n      }\n      if (open) setTimeout(() => document.getElementById('verdie-input').focus(), 280);\n    }\n\n    (function() {\n      const API    = '\/wp-json\/chatbot\/v1\/claude';\n      const msgsEl = document.getElementById('verdie-msgs');\n      const inp    = document.getElementById('verdie-input');\n      const snd    = document.getElementById('verdie-send');\n\n      inp.addEventListener('input', () => {\n        inp.style.height = 'auto';\n        inp.style.height = Math.min(inp.scrollHeight, 90) + 'px';\n      });\n      inp.addEventListener('keydown', e => {\n        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); go(); }\n      });\n      snd.addEventListener('click', go);\n\n      function go() {\n        const q = inp.value.trim();\n        if (!q) return;\n        verdieAdd('user', q);\n        inp.value = ''; inp.style.height = 'auto';\n        snd.disabled = true;\n        const t = think();\n        fetch(API, { method:'POST', headers:{'Content-Type':'application\/json'}, body: JSON.stringify({question:q}) })\n          .then(r => r.json())\n          .then(d => { t.rm(); verdieAdd('ai', d.response || d.error || 'Unexpected response.'); })\n          .catch(() => { t.rm(); verdieAdd('ai', 'Could not connect. Please call us at 800-248-3734.'); })\n          .finally(() => { snd.disabled = false; inp.focus(); });\n      }\n\n      function think() {\n        const el = document.createElement('div');\n        el.className = 'vthink';\n        el.innerHTML = '<div class=\"vdots\"><span><\/span><span><\/span><span><\/span><\/div><span>Thinking\\u2026<\/span>';\n        msgsEl.appendChild(el);\n        msgsEl.scrollTop = msgsEl.scrollHeight;\n        return { rm: () => el.remove() };\n      }\n\n      window.verdieAdd = function(role, text) {\n        const w = document.createElement('div'); w.className = 'vmsg ' + role;\n        const l = document.createElement('div'); l.className = 'vmsg-lbl'; l.textContent = role === 'user' ? 'You' : 'Verdie';\n        const b = document.createElement('div'); b.className = 'vmsg-bub';\n        b.innerHTML = text.replace(\/&\/g,'&amp;').replace(\/<\/g,'&lt;').replace(\/>\/g,'&gt;')\n          .replace(\/\\[([^\\]]+)\\]\\((https?:\\\/\\\/[^)]+)\\)\/g,'<a href=\"$1\" target=\"_blank\">$2<\/a>')\n          .replace(\/\\*\\*([^*]+)\\*\\*\/g,'<strong>$1<\/strong>').replace(\/\\n\/g,'<br>');\n        w.appendChild(l); w.appendChild(b); msgsEl.appendChild(w);\n        msgsEl.scrollTop = msgsEl.scrollHeight;\n      };\n    })();\n  <\/script>\n\n\n\n  <script>\n  (function(){\n    var root = document.documentElement;\n    var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    if (reduce || !('IntersectionObserver' in window)) { root.classList.remove('anim'); return; }\n    try {\n\n    var SEL = '.hero-eyebrow,.hero h1,.hero-sub,.hero-btns,.hero-art img,' +\n      '.panel-kicker,.panel-h2,.panel-bullets li,.panel-text .btn-arrow,.panel-img img,' +\n      '.about-section .section-kicker,.about-section .section-h2,.about-section .section-body,' +\n      '.about-section .badge,.about-visual,' +\n      '.wsa-headline,.wsa-sub,.wsa-inner .btn-arrow,.wsa-item,' +\n      '.products-section .section-kicker,.products-section .section-h2,.section-head .btn-arrow,.product-card,' +\n      '.cta-h2,.cta-sub,.cta-band .btn-black';\n    var targets = Array.prototype.slice.call(document.querySelectorAll(SEL));\n\n    \/\/ stagger siblings (delay the reveal, not the element's transitions \u2014 keeps hover snappy)\n    var groups = new Map();\n    targets.forEach(function(t){\n      var p = t.parentElement;\n      if (!groups.has(p)) groups.set(p, []);\n      groups.get(p).push(t);\n    });\n    groups.forEach(function(arr){ arr.forEach(function(t, i){ t.__d = i * 70; }); });\n\n    var io = new IntersectionObserver(function(entries){\n      entries.forEach(function(e){\n        if (!e.isIntersecting) return;\n        var el = e.target; io.unobserve(el);\n        setTimeout(function(){ el.classList.add('is-in'); }, el.__d || 0);\n      });\n    }, { threshold: 0.12, rootMargin: '0px 0px -7% 0px' });\n    targets.forEach(function(t){ io.observe(t); });\n\n    \/\/ safety net: nothing stays hidden no matter what\n    setTimeout(function(){ targets.forEach(function(t){ t.classList.add('is-in'); }); }, 2600);\n\n    \/\/ scroll-progress bar + nav elevation\n    var bar = document.createElement('div'); bar.className = 'scroll-prog';\n    document.body.appendChild(bar);\n    var nav = document.querySelector('.main-nav');\n    var ticking = false;\n    function onScroll(){\n      if (ticking) return; ticking = true;\n      requestAnimationFrame(function(){\n        var st = window.pageYOffset || document.documentElement.scrollTop || 0;\n        var h = (document.documentElement.scrollHeight - window.innerHeight) || 1;\n        bar.style.transform = 'scaleX(' + Math.min(st \/ h, 1) + ')';\n        if (nav) nav.classList.toggle('scrolled', st > 20);\n        ticking = false;\n      });\n    }\n    window.addEventListener('scroll', onScroll, { passive: true });\n    onScroll();\n\n    \/\/ count-up on the \"25+\" stat when it scrolls into view\n    var co = document.querySelector('.callout-num');\n    if (co) {\n      var mm = co.textContent.match(\/(\\D*)(\\d+)(\\D*)\/);\n      if (mm) {\n        var pre = mm[1], target = +mm[2], suf = mm[3];\n        co.textContent = pre + '0' + suf;\n        var io3 = new IntersectionObserver(function(es){\n          if (!es[0].isIntersecting) return;\n          io3.disconnect();\n          var t0 = null, dur = 1300;\n          (function tick(ts){\n            if (t0 === null) t0 = ts;\n            var p = Math.min((ts - t0) \/ dur, 1);\n            co.textContent = pre + Math.round((1 - Math.pow(1 - p, 3)) * target) + suf;\n            if (p < 1) requestAnimationFrame(tick);\n          })(performance.now());\n        }, { threshold: 0.45 });\n        io3.observe(co);\n      }\n    }\n\n    } catch (err) { root.classList.remove('anim'); }  \/\/ fail-safe: reveal everything\n  })();\n  <\/script>\n<\/body><\/html>"
